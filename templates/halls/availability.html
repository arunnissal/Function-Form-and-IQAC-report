{% extends 'base.html' %}

{% block extra_css %}
<!-- FullCalendar CSS -->
<link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css' rel='stylesheet' />
<style>
    #calendar {
        max-width: 1000px;
        margin: 0 auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .fc-event {
        cursor: pointer;
    }
    @media (max-width: 768px) {
        #calendar {
            padding: 10px;
        }
        .fc-toolbar {
            flex-direction: column;
            gap: 10px;
        }
        .fc-toolbar-title {
            font-size: 1.25rem !important;
        }
        .fc-button {
            padding: 0.25em 0.5em !important;
            font-size: 0.875rem !important;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-10">
        <h3 class="mb-4 text-center">Seminar Hall Booking Calendar</h3>
        <p class="text-center text-muted">This calendar shows all strictly APPROVED bookings. Pending requests are not shown to prevent confusion.</p>
        
        <div id='calendar'></div>
        
    </div>
</div>
{% endblock %}

{% block extra_js %}
<!-- FullCalendar JS -->
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js'></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        var eventsData = {{ events_json|safe }};
        
        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek,timeGridDay'
            },
            events: eventsData,
            eventClick: function(info) {
                alert('Event: ' + info.event.title + '\nDetails: ' + info.event.extendedProps.description);
            }
        });
        
        calendar.render();
    });
</script>
{% endblock %}
